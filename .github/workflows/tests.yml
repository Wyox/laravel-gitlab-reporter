name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        laravel: ['9', '10', '11', '12', '13']
        stability: [prefer-stable]
        exclude:
          - php: '8.1'
            laravel: '11'
          - php: '8.1'
            laravel: '12'
          - php: '8.1'
            laravel: '13'
          - php: '8.2'
            laravel: '13'
          - php: '8.4'
            laravel: '9'
        include:
          - laravel: '9'
            testbench: '7.*'
            phpunit: '9.*'
          - laravel: '10'
            testbench: '8.*'
            phpunit: '10.*'
          - laravel: '11'
            testbench: '9.*'
            phpunit: '11.*'
          - laravel: '12'
            testbench: '10.*'
            phpunit: '11.*'
          - laravel: '13'
            testbench: '11.*'
            phpunit: '12.*'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.laravel }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.laravel }}-

      - name: Install dependencies
        run: |
          composer require "illuminate/support:^${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "phpunit/phpunit:${{ matrix.phpunit }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/phpunit --colors=always
